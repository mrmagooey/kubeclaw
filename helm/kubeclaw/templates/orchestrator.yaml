---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeclaw-orchestrator
  namespace: {{ .Values.namespace }}
---
# Grants the orchestrator permission to create/list/delete agent Jobs and read pod logs.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubeclaw-job-manager
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Admin shell: create/patch per-channel secrets and trigger rolling restarts
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "create", "patch", "replace"]
  # Admin shell: create per-channel PVCs
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubeclaw-orchestrator-binding
  namespace: {{ .Values.namespace }}
subjects:
  - kind: ServiceAccount
    name: kubeclaw-orchestrator
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: kubeclaw-job-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeclaw-orchestrator
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.orchestrator.replicas }}
  selector:
    matchLabels:
      app: kubeclaw-orchestrator
  template:
    metadata:
      labels:
        app: kubeclaw-orchestrator
    spec:
      serviceAccountName: kubeclaw-orchestrator
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-permissions
          image: busybox:latest
          command:
            - sh
            - -c
            - chown -R 1000:1000 /app/groups /app/store /data/sessions
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: groups
              mountPath: /app/groups
            - name: store
              mountPath: /app/store
            - name: sessions
              mountPath: /data/sessions
      containers:
        - name: orchestrator
          image: {{ include "kubeclaw.image" (dict "root" . "name" "kubeclaw-orchestrator") }}
          imagePullPolicy: {{ include "kubeclaw.pullPolicy" . }}
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: REDIS_URL
              value: redis://kubeclaw-redis:6379
            - name: REDIS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubeclaw-redis
                  key: admin-password
            - name: KUBECLAW_MODE
              value: orchestrator
            - name: KUBECLAW_RUNTIME
              value: kubernetes
            - name: KUBECLAW_NAMESPACE
              value: {{ .Values.namespace }}
            - name: KUBECLAW_IPC_BASE
              value: /data/sessions
            - name: MAX_CONCURRENT_JOBS
              value: {{ .Values.orchestrator.maxConcurrentJobs | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.secretName" . }}
                  key: anthropic-api-key
                  optional: true
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.secretName" . }}
                  key: claude-code-oauth-token
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.secretName" . }}
                  key: openai-api-key
                  optional: true
            - name: OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.secretName" . }}
                  key: openai-base-url
                  optional: true
            - name: DIRECT_LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.secretName" . }}
                  key: direct-llm-model
                  optional: true
            {{- if .Values.rag.enabled }}
            - name: QDRANT_URL
              value: "http://kubeclaw-qdrant:6333"
            - name: EMBEDDING_PROVIDER
              value: {{ .Values.rag.provider | quote }}
            {{- if .Values.rag.model }}
            - name: EMBEDDING_MODEL
              value: {{ .Values.rag.model | quote }}
            {{- end }}
            - name: RAG_TOP_K
              value: {{ .Values.rag.topK | quote }}
            - name: RAG_SCORE_THRESHOLD
              value: {{ .Values.rag.scoreThreshold | quote }}
            {{- if eq .Values.rag.provider "voyage" }}
            - name: VOYAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.secretName" . }}
                  key: voyage-api-key
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: groups
              mountPath: /app/groups
            - name: store
              mountPath: /app/store
            - name: sessions
              mountPath: /data/sessions
          resources:
            {{- toYaml .Values.orchestrator.resources | nindent 12 }}
      volumes:
        - name: groups
          persistentVolumeClaim:
            claimName: kubeclaw-groups
        - name: store
          persistentVolumeClaim:
            claimName: kubeclaw-store
        - name: sessions
          persistentVolumeClaim:
            claimName: kubeclaw-sessions
