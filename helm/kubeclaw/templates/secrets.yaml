{{- if not .Values.secrets.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: kubeclaw-secrets
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | quote }}
  claude-code-oauth-token: {{ .Values.secrets.claudeCodeOauthToken | quote }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | quote }}
  openai-base-url: {{ .Values.secrets.openaiBaseUrl | quote }}
  direct-llm-model: {{ .Values.secrets.directLlmModel | quote }}
  {{- if .Values.orchestrator.admin.enabled }}
  {{- $adminSecret := lookup "v1" "Secret" .Values.namespace "kubeclaw-secrets" }}
  {{- $adminPass := .Values.secrets.adminHttpPassword }}
  {{- if and (not $adminPass) $adminSecret (hasKey ($adminSecret.data | default dict) "admin-http-password") }}
    {{- $adminPass = index $adminSecret.data "admin-http-password" | b64dec }}
  {{- end }}
  {{- if not $adminPass }}
    {{- $adminPass = randAlphaNum 24 }}
  {{- end }}
  admin-http-password: {{ $adminPass | quote }}
  {{- end }}
{{- end }}
---
{{- /*
  Redis admin password:
  - Use .Values.redis.password if explicitly set.
  - Otherwise look up an existing Secret so upgrades don't rotate the password.
  - Fall back to generating a random password on first install.
*/}}
{{- $redisSecret := lookup "v1" "Secret" .Values.namespace "kubeclaw-redis" }}
{{- $redisPassword := .Values.redis.password }}
{{- if and (not $redisPassword) $redisSecret (hasKey ($redisSecret.data | default dict) "admin-password") }}
  {{- $redisPassword = index $redisSecret.data "admin-password" | b64dec }}
{{- end }}
{{- if not $redisPassword }}
  {{- $redisPassword = randAlphaNum 32 }}
{{- end }}
{{- /* Per-role ACL passwords — preserved across upgrades via secret lookup */}}
{{- $channelPassword := "" }}
{{- if and $redisSecret (hasKey ($redisSecret.data | default dict) "channel-password") }}{{- $channelPassword = index $redisSecret.data "channel-password" | b64dec }}{{- end }}
{{- if not $channelPassword }}{{- $channelPassword = randAlphaNum 32 }}{{- end }}
{{- $agentPassword := "" }}
{{- if and $redisSecret (hasKey ($redisSecret.data | default dict) "agent-password") }}{{- $agentPassword = index $redisSecret.data "agent-password" | b64dec }}{{- end }}
{{- if not $agentPassword }}{{- $agentPassword = randAlphaNum 32 }}{{- end }}
{{- $toolServerPassword := "" }}
{{- if and $redisSecret (hasKey ($redisSecret.data | default dict) "tool-server-password") }}{{- $toolServerPassword = index $redisSecret.data "tool-server-password" | b64dec }}{{- end }}
{{- if not $toolServerPassword }}{{- $toolServerPassword = randAlphaNum 32 }}{{- end }}
{{- $adapterPassword := "" }}
{{- if and $redisSecret (hasKey ($redisSecret.data | default dict) "adapter-password") }}{{- $adapterPassword = index $redisSecret.data "adapter-password" | b64dec }}{{- end }}
{{- if not $adapterPassword }}{{- $adapterPassword = randAlphaNum 32 }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: kubeclaw-redis
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  admin-password: {{ $redisPassword | quote }}
  channel-password: {{ $channelPassword | quote }}
  agent-password: {{ $agentPassword | quote }}
  tool-server-password: {{ $toolServerPassword | quote }}
  adapter-password: {{ $adapterPassword | quote }}
{{- /*
  Per-channel HTTP secrets — auto-generate admin:password on first install.
  Preserved across upgrades via Secret lookup.
  Supports multiple HTTP channel instances (e.g. http, http-staging).
*/}}
{{- range $name, $cfg := .Values.channels }}
{{- $channelType := $cfg.type | default $name }}
{{- if and $cfg.enabled (eq $channelType "http") }}
---
{{- $secretName := printf "kubeclaw-channel-%s" $name }}
{{- $existingSecret := lookup "v1" "Secret" $.Values.namespace $secretName }}
{{- $httpUsers := $.Values.secrets.httpChannelUsers }}
{{- if and (not $httpUsers) $existingSecret (hasKey ($existingSecret.data | default dict) "users") }}
  {{- $httpUsers = index $existingSecret.data "users" | b64dec }}
{{- end }}
{{- if not $httpUsers }}
  {{- $httpUsers = printf "admin:%s" (randAlphaNum 24) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $.Values.namespace }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  users: {{ $httpUsers | quote }}
  port: {{ $cfg.httpPort | default 4080 | quote }}
{{- end }}
{{- end }}
