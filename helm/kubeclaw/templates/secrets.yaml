{{- if not .Values.secrets.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: kubeclaw-secrets
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | quote }}
  claude-code-oauth-token: {{ .Values.secrets.claudeCodeOauthToken | quote }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | quote }}
  openai-base-url: {{ .Values.secrets.openaiBaseUrl | quote }}
  direct-llm-model: {{ .Values.secrets.directLlmModel | quote }}
  voyage-api-key: {{ .Values.secrets.voyageApiKey | quote }}
{{- end }}
---
{{- /*
  Redis admin password:
  - Use .Values.redis.password if explicitly set.
  - Otherwise look up an existing Secret so upgrades don't rotate the password.
  - Fall back to generating a random password on first install.
*/}}
{{- $redisSecret := lookup "v1" "Secret" .Values.namespace "kubeclaw-redis" }}
{{- $redisPassword := .Values.redis.password }}
{{- if and (not $redisPassword) $redisSecret }}
  {{- $redisPassword = index $redisSecret.data "admin-password" | b64dec }}
{{- end }}
{{- if not $redisPassword }}
  {{- $redisPassword = randAlphaNum 32 }}
{{- end }}
{{- /* Per-role ACL passwords — preserved across upgrades via secret lookup */}}
{{- $channelPassword := "" }}
{{- if $redisSecret }}{{- $channelPassword = index $redisSecret.data "channel-password" | b64dec }}{{- end }}
{{- if not $channelPassword }}{{- $channelPassword = randAlphaNum 32 }}{{- end }}
{{- $agentPassword := "" }}
{{- if $redisSecret }}{{- $agentPassword = index $redisSecret.data "agent-password" | b64dec }}{{- end }}
{{- if not $agentPassword }}{{- $agentPassword = randAlphaNum 32 }}{{- end }}
{{- $toolServerPassword := "" }}
{{- if $redisSecret }}{{- $toolServerPassword = index $redisSecret.data "tool-server-password" | b64dec }}{{- end }}
{{- if not $toolServerPassword }}{{- $toolServerPassword = randAlphaNum 32 }}{{- end }}
{{- $adapterPassword := "" }}
{{- if $redisSecret }}{{- $adapterPassword = index $redisSecret.data "adapter-password" | b64dec }}{{- end }}
{{- if not $adapterPassword }}{{- $adapterPassword = randAlphaNum 32 }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: kubeclaw-redis
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  admin-password: {{ $redisPassword | quote }}
  channel-password: {{ $channelPassword | quote }}
  agent-password: {{ $agentPassword | quote }}
  tool-server-password: {{ $toolServerPassword | quote }}
  adapter-password: {{ $adapterPassword | quote }}
