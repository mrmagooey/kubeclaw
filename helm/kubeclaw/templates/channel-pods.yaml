{{- range $name, $cfg := .Values.channels }}
{{- if $cfg.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeclaw-channel-{{ $name }}
  namespace: {{ $.Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeclaw-channel-{{ $name }}
  template:
    metadata:
      labels:
        app: kubeclaw-channel-{{ $name }}
        kubeclaw/channel: {{ $name }}
    spec:
      # No K8s API access — channel pods delegate all K8s operations to the orchestrator
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-permissions
          image: busybox:latest
          command:
            - sh
            - -c
            - chown -R 1000:1000 /app/groups /app/store /data/sessions
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: groups
              mountPath: /app/groups
            - name: store
              mountPath: /app/store
            - name: sessions
              mountPath: /data/sessions
      containers:
        - name: channel
          image: {{ include "kubeclaw.image" (dict "root" $ "name" "kubeclaw-orchestrator") }}
          imagePullPolicy: {{ include "kubeclaw.pullPolicy" $ }}
          command: ["node", "dist/channel-runner.js"]
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: KUBECLAW_MODE
              value: channel
            - name: KUBECLAW_CHANNEL
              value: {{ $name }}
            - name: KUBECLAW_CHANNEL_TYPE
              value: {{ $cfg.type | default $name }}
            - name: REDIS_URL
              value: redis://kubeclaw-redis:6379
            - name: REDIS_USERNAME
              value: channel
            - name: REDIS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubeclaw-redis
                  key: channel-password
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.secretName" $ }}
                  key: openai-api-key
                  optional: true
            - name: OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.secretName" $ }}
                  key: openai-base-url
                  optional: true
            - name: DIRECT_LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.secretName" $ }}
                  key: direct-llm-model
                  optional: true
            {{- if $.Values.rag.enabled }}
            - name: QDRANT_URL
              value: "http://kubeclaw-qdrant:6333"
            - name: EMBEDDING_PROVIDER
              value: {{ $.Values.rag.provider | quote }}
            {{- if $.Values.rag.model }}
            - name: EMBEDDING_MODEL
              value: {{ $.Values.rag.model | quote }}
            {{- end }}
            - name: RAG_TOP_K
              value: {{ $.Values.rag.topK | quote }}
            - name: RAG_SCORE_THRESHOLD
              value: {{ $.Values.rag.scoreThreshold | quote }}
            {{- if eq $.Values.rag.provider "voyage" }}
            - name: VOYAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.secretName" $ }}
                  key: voyage-api-key
            {{- end }}
            {{- end }}
            {{- range $cfg.envVars }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: kubeclaw-channel-{{ $name }}
                  key: {{ .key }}
                  optional: {{ default false .optional }}
            {{- end }}
          ports:
            {{- if $cfg.httpPort }}
            - name: http
              containerPort: {{ $cfg.httpPort }}
              protocol: TCP
            {{- end }}
            - name: health
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /liveness
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          volumeMounts:
            - name: groups
              mountPath: /app/groups
            - name: store
              mountPath: /app/store
            - name: sessions
              mountPath: /data/sessions
          resources:
            {{- toYaml $.Values.channelPod.resources | nindent 12 }}
      volumes:
        - name: groups
          persistentVolumeClaim:
            claimName: kubeclaw-channel-{{ $name }}-groups
        - name: store
          persistentVolumeClaim:
            claimName: kubeclaw-channel-{{ $name }}-store
        - name: sessions
          persistentVolumeClaim:
            claimName: kubeclaw-channel-{{ $name }}-sessions
{{- if and $cfg.httpPort $.Values.networkPolicy.enabled }}
---
# Allow ingress on the HTTP port — the global channel policy denies all pod-to-pod
# ingress, so channels with httpPort need an explicit per-channel exception for the
# ingress controller to reach them.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubeclaw-channel-{{ $name }}-ingress
  namespace: {{ $.Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: kubeclaw-channel-{{ $name }}
  policyTypes:
    - Ingress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: {{ $cfg.httpPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: kubeclaw-channel-{{ $name }}
  namespace: {{ $.Values.namespace }}
spec:
  selector:
    app: kubeclaw-channel-{{ $name }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP
{{- if $cfg.ingress }}
{{- if $cfg.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubeclaw-channel-{{ $name }}
  namespace: {{ $.Values.namespace }}
  {{- if $cfg.ingress.annotations }}
  annotations:
    {{- toYaml $cfg.ingress.annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if $cfg.ingress.className }}
  ingressClassName: {{ $cfg.ingress.className }}
  {{- end }}
  {{- if $cfg.ingress.tls }}
  tls:
    {{- toYaml $cfg.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ $cfg.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubeclaw-channel-{{ $name }}
                port:
                  name: http
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
