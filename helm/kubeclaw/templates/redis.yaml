---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kubeclaw-redis
  namespace: {{ .Values.namespace }}
spec:
  serviceName: kubeclaw-redis
  replicas: 1
  selector:
    matchLabels:
      app: kubeclaw-redis
  template:
    metadata:
      labels:
        app: kubeclaw-redis
    spec:
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-permissions
          image: busybox:latest
          command: ["sh", "-c", "chown -R 999:999 /data && touch /data/redis-acl.conf && chown 999:999 /data/redis-acl.conf"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            - --maxmemory
            - {{ .Values.redis.maxmemory }}
            - --maxmemory-policy
            - allkeys-lru
            - --aclfile
            - /data/redis-acl.conf
            - --requirepass
            - "$(REDIS_ADMIN_PASSWORD)"
          env:
            - name: REDIS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubeclaw-redis
                  key: admin-password
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- include "kubeclaw.storageClassName" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.redis.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: kubeclaw-redis
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: kubeclaw-redis
  ports:
    - port: 6379
      targetPort: 6379
