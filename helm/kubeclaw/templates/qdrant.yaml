{{- if .Values.rag.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kubeclaw-qdrant
  namespace: {{ .Values.namespace }}
spec:
  serviceName: kubeclaw-qdrant
  replicas: 1
  selector:
    matchLabels:
      app: kubeclaw-qdrant
  template:
    metadata:
      labels:
        app: kubeclaw-qdrant
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: qdrant
          image: qdrant/qdrant:{{ .Values.rag.qdrantVersion }}
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: {{ .Values.rag.resources.limits.memory }}
              cpu: {{ .Values.rag.resources.limits.cpu | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 15
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- include "kubeclaw.storageClassName" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.rag.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: kubeclaw-qdrant
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: kubeclaw-qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
{{- end }}
