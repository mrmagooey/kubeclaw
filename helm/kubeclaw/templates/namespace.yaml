apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace }}
  labels:
    app: kubeclaw
    # privileged PodSecurity allows Redis to run as UID 999 and the
    # orchestrator to run as root (needed for chown init containers).
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
