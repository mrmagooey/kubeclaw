apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubeclaw-test-pvc-rwo
  namespace: kubeclaw
  labels:
    app: kubeclaw
    test: e2e
    storage-class: rwo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubeclaw-test-pvc-rwx
  namespace: kubeclaw
  labels:
    app: kubeclaw
    test: e2e
    storage-class: rwx
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubeclaw-test-pvc-data
  namespace: kubeclaw
  labels:
    app: kubeclaw
    test: e2e
    storage-class: data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
