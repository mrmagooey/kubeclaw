apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nanoclaw-test-pvc-rwo
  namespace: nanoclaw
  labels:
    app: nanoclaw
    test: e2e
    storage-class: rwo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nanoclaw-test-pvc-rwx
  namespace: nanoclaw
  labels:
    app: nanoclaw
    test: e2e
    storage-class: rwx
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nanoclaw-test-pvc-data
  namespace: nanoclaw
  labels:
    app: nanoclaw
    test: e2e
    storage-class: data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
