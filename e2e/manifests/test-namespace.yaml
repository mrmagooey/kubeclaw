apiVersion: v1
kind: Namespace
metadata:
  name: nanoclaw
  labels:
    app: nanoclaw
    pod-security.kubernetes.io/enforce: restricted
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: nanoclaw-test-quota
  namespace: nanoclaw
  labels:
    app: nanoclaw
    test: e2e
spec:
  hard:
    requests.cpu: '10'
    requests.memory: 20Gi
    limits.cpu: '20'
    limits.memory: 40Gi
    pods: '50'
    jobs.batch: '20'
    persistentvolumeclaims: '10'
---
apiVersion: v1
kind: LimitRange
metadata:
  name: nanoclaw-test-limits
  namespace: nanoclaw
  labels:
    app: nanoclaw
    test: e2e
spec:
  limits:
    - default:
        cpu: '2'
        memory: 4Gi
      defaultRequest:
        cpu: 500m
        memory: 512Mi
      max:
        cpu: '4'
        memory: 8Gi
      min:
        cpu: 100m
        memory: 128Mi
      type: Container
