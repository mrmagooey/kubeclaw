apiVersion: batch/v1
kind: Job
metadata:
  name: simple-job
  namespace: nanoclaw
  labels:
    app: nanoclaw
    test: e2e
    job-type: simple
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 0
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: nanoclaw
        test: e2e
        job-type: simple
    spec:
      restartPolicy: Never
      containers:
        - name: test
          image: busybox:stable
          command:
            [
              'sh',
              '-c',
              'echo "Hello from simple-job" && sleep 1 && echo "Success"',
            ]
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
---
