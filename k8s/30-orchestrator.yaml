apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeclaw-orchestrator
  namespace: kubeclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubeclaw-job-manager
  namespace: kubeclaw
rules:
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - ''
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ''
    resources:
      - pods/log
    verbs:
      - get
  - apiGroups:
      - ''
    resources:
      - persistentvolumeclaims
    verbs:
      - create
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - ''
    resources:
      - services
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubeclaw-orchestrator-binding
  namespace: kubeclaw
subjects:
  - kind: ServiceAccount
    name: kubeclaw-orchestrator
    namespace: kubeclaw
roleRef:
  kind: Role
  name: kubeclaw-job-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeclaw-orchestrator
  namespace: kubeclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeclaw-orchestrator
  template:
    metadata:
      labels:
        app: kubeclaw-orchestrator
    spec:
      serviceAccountName: kubeclaw-orchestrator
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-permissions
          image: busybox:latest
          command:
            - sh
            - -c
            - chown -R 1000:1000 /app/groups /app/store /data/sessions
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: groups
              mountPath: /app/groups
            - name: store
              mountPath: /app/store
            - name: sessions
              mountPath: /data/sessions
      containers:
        - name: orchestrator
          image: kubeclaw-orchestrator:latest
          imagePullPolicy: Never
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: REDIS_URL
              value: redis://kubeclaw-redis:6379
            - name: REDIS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubeclaw-redis
                  key: admin-password
            - name: NANOCLAW_RUNTIME
              value: kubernetes
            - name: NANOCLAW_NAMESPACE
              value: kubeclaw
            - name: NANOCLAW_IPC_BASE
              value: /data/sessions
            - name: MAX_CONCURRENT_JOBS
              value: '10'
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kubeclaw-secrets
                  key: anthropic-api-key
                  optional: true
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kubeclaw-secrets
                  key: claude-code-oauth-token
                  optional: true
            - name: IRC_SERVER
              value: kubeclaw-irc-mock
            - name: IRC_PORT
              value: '16667'
            - name: IRC_NICK
              value: NanoClawBot
            - name: IRC_CHANNELS
              value: '#test-e2e'
          volumeMounts:
            - name: groups
              mountPath: /app/groups
            - name: store
              mountPath: /app/store
            - name: sessions
              mountPath: /data/sessions
            - name: plugins
              mountPath: /workspace/plugins
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: groups
          persistentVolumeClaim:
            claimName: kubeclaw-groups
        - name: store
          persistentVolumeClaim:
            claimName: kubeclaw-store
        - name: sessions
          persistentVolumeClaim:
            claimName: kubeclaw-sessions
        - name: plugins
          persistentVolumeClaim:
            claimName: kubeclaw-plugins
