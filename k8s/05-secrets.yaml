# NanoClaw Secrets Template
#
# This file contains placeholder values for Kubernetes secrets.
# DO NOT commit real secrets to version control!
#
# Instructions:
# 1. Copy this file and populate with real values, OR
# 2. Use kubectl command to create secrets directly (recommended for CI/CD)
#
# Option A: Create secrets via kubectl (Recommended)
#   export ANTHROPIC_API_KEY="your-api-key-here"
#   export CLAUDE_CODE_OAUTH_TOKEN="your-oauth-token-here"
#   kubectl create secret generic nanoclaw-secrets \
#     --from-literal=anthropic-api-key=$ANTHROPIC_API_KEY \
#     --from-literal=claude-code-oauth-token=$CLAUDE_CODE_OAUTH_TOKEN \
#     -n nanoclaw
#
# Option B: Use this file with envsubst or similar
#   envsubst < k8s/05-secrets.yaml | kubectl apply -f -
#
# Required Secrets:
#   - anthropic-api-key:     Your Anthropic API key for Claude API access
#   - claude-code-oauth-token: OAuth token for Claude Code integration
#
# Optional Secrets (add as needed):
#   - openai-api-key:        For OpenAI API access (if using OpenAI features)
#   - slack-bot-token:       For Slack integration
#   - telegram-bot-token:    For Telegram integration
#   - whatsapp-session:      For WhatsApp session data

apiVersion: v1
kind: Secret
metadata:
  name: nanoclaw-secrets
  namespace: nanoclaw
type: Opaque
stringData:
  # REQUIRED: Get from https://console.anthropic.com/
  anthropic-api-key: 'PLACEHOLDER_ANTHROPIC_API_KEY'

  # REQUIRED: OAuth token for Claude Code
  claude-code-oauth-token: 'PLACEHOLDER_CLAUDE_CODE_OAUTH_TOKEN'

  # Optional: OpenAI API key (if using OpenAI features)
  # openai-api-key: "PLACEHOLDER_OPENAI_API_KEY"

  # Optional: Channel integration secrets
  # slack-bot-token: "PLACEHOLDER_SLACK_BOT_TOKEN"
  # telegram-bot-token: "PLACEHOLDER_TELEGRAM_BOT_TOKEN"
  # redis-admin-password: "PLACEHOLDER_REDIS_ADMIN_PASSWORD"

---
# Redis-specific secrets for ACL-based authentication
# Redis 7+ required for ACL support
apiVersion: v1
kind: Secret
metadata:
  name: nanoclaw-redis
  namespace: nanoclaw
type: Opaque
stringData:
  # REQUIRED: Admin password for Redis ACL authentication
  # This is used for admin-level commands and initial ACL setup
  # Generate a strong password and keep it secure
  # kubectl create secret generic nanoclaw-redis \
  #   --from-literal=admin-password=$(openssl rand -base64 32) \
  #   -n nanoclaw
  admin-password: 'PLACEHOLDER_REDIS_ADMIN_PASSWORD'
