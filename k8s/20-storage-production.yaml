# Production Storage Configuration
# Use this for production environments with proper ReadWriteMany (RWX) support.
# This configuration supports concurrent agent jobs accessing the same volumes.
#
# Supported Storage Classes:
#   AWS:        efs-sc, ebs-sc (requires EFS CSI driver for RWX)
#   GCP:        filestore (for RWX volumes)
#   Azure:      azurefile (for RWX volumes)
#   On-premise: nfs-client, rook-cephfs, longhorn
#
# For AWS EKS with EFS:
#   1. Install EFS CSI driver: https://docs.aws.amazon.com/eks/latest/userguide/efs-csi.html
#   2. Create EFS filesystem and storage class
#   3. Update storageClassName below to match your EFS storage class
#
# Apply with:
#   kubectl apply -f k8s/20-storage-production.yaml
#
# See also:
#   k8s/20-storage-minikube.yaml - For local development with RWO only

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubeclaw-groups
  namespace: kubeclaw
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  # Uncomment and modify for your cloud provider:
  # storageClassName: efs-sc  # AWS EFS
  # storageClassName: azurefile  # Azure Files
  # storageClassName: filestore  # GCP Filestore
  # storageClassName: nfs-client  # NFS
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubeclaw-sessions
  namespace: kubeclaw
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  # Uncomment and modify for your cloud provider:
  # storageClassName: efs-sc  # AWS EFS
  # storageClassName: azurefile  # Azure Files
  # storageClassName: filestore  # GCP Filestore
  # storageClassName: nfs-client  # NFS
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubeclaw-project
  namespace: kubeclaw
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  # Uncomment and modify for your cloud provider:
  # storageClassName: efs-sc  # AWS EFS
  # storageClassName: azurefile  # Azure Files
  # storageClassName: filestore  # GCP Filestore
  # storageClassName: nfs-client  # NFS
