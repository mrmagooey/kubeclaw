apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubeclaw-agent-policy
  namespace: kubeclaw
spec:
  podSelector:
    matchLabels:
      app: kubeclaw-agent
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
    # Allow Redis access within namespace
    - to:
        - podSelector:
            matchLabels:
              app: kubeclaw-redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow Anthropic API and other HTTPS endpoints
    - to: []
      ports:
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubeclaw-orchestrator-policy
  namespace: kubeclaw
spec:
  podSelector:
    matchLabels:
      app: kubeclaw-orchestrator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to: []
