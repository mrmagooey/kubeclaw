# Minikube Storage Configuration
# Use this for local development with minikube or single-node clusters
# that don't support ReadWriteMany (RWX) storage classes.
#
# IMPORTANT: ReadWriteOnce (RWO) volumes can only be mounted by ONE pod at a time.
# This means you CANNOT run multiple agent jobs concurrently with this configuration.
# For production environments with concurrent agents, use NFS/EFS-based RWX storage.
#
# Apply with:
#   kubectl apply -f k8s/20-storage-minikube.yaml
#
# See also:
#   k8s/20-storage-production.yaml - For production with RWX support

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nanoclaw-groups
  namespace: nanoclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  # storageClassName: standard  # Uncomment and set for minikube if needed
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nanoclaw-sessions
  namespace: nanoclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  # storageClassName: standard  # Uncomment and set for minikube if needed
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nanoclaw-project
  namespace: nanoclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: standard  # Uncomment and set for minikube if needed
